<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline — MikeBuildsBooks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      color: #fff;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 400px; }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 1.75rem; font-weight: 800; margin-bottom: 12px; }
    p { color: #9ca3af; font-size: 0.95rem; line-height: 1.6; margin-bottom: 28px; }
    .badge {
      display: inline-block;
      background: rgba(250,204,21,0.1);
      border: 1px solid rgba(250,204,21,0.3);
      color: #facc15;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 9999px;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    button {
      background: #facc15;
      color: #000;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #fde047; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <div class="badge">No Internet Connection</div>
    <h1>You're Offline</h1>
    <p>MikeBuildsBooks needs an internet connection to sync your jobs, bids, and finances. Please check your connection and try again.</p>
    <button type="button" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
