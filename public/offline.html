<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline — MikeBuildsBooks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 2rem; font-weight: 800; margin-bottom: 12px; color: #facc15; }
    p { color: #9ca3af; font-size: 1rem; line-height: 1.6; max-width: 360px; margin: 0 auto 24px; }
    button { background: #facc15; color: #000; font-weight: 700; border: none; padding: 12px 28px; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #fde047; }
  </style>
</head>
<body>
  <div>
    <div class="icon">📶</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Please check your network and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
