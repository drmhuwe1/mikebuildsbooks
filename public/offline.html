<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#facc15" />
  <title>Offline — MikeBuildsBooks</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .offline-container {
      text-align: center;
      max-width: 500px;
      animation: fadeIn 0.6s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .offline-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: rgba(250, 204, 21, 0.1);
      border: 2px solid #facc15;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 12px;
      color: #facc15;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #ccc;
      margin-bottom: 32px;
    }
    .offline-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    button {
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    .btn-primary {
      background: #facc15;
      color: #000;
    }
    .btn-primary:hover {
      background: #f0c81f;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(250, 204, 21, 0.3);
    }
    .btn-secondary {
      background: transparent;
      color: #facc15;
      border: 1px solid #facc15;
    }
    .btn-secondary:hover {
      background: rgba(250, 204, 21, 0.1);
      transform: translateY(-2px);
    }
    .offline-info {
      margin-top: 24px;
      padding: 16px;
      background: rgba(250, 204, 21, 0.05);
      border-left: 3px solid #facc15;
      border-radius: 4px;
      font-size: 13px;
      color: #aaa;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Some features of MikeBuildsBooks may be unavailable while offline.</p>
    
    <div class="offline-actions">
      <button class="btn-primary" onclick="location.reload()">Try Again</button>
      <button class="btn-secondary" onclick="goHome()">Return to Home</button>
    </div>

    <div class="offline-info">
      <strong>Offline Mode:</strong> MikeBuildsBooks is designed to work offline. Cached pages and data are available. Your work will sync once reconnected.
    </div>
  </div>

  <script>
    function goHome() {
      window.location.href = '/';
    }

    // Auto-detect when back online
    window.addEventListener('online', () => {
      location.reload();
    });
  </script>
</body>
</html>
