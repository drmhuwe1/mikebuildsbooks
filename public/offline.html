<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline — MikeBuildsBooks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 4rem; margin-bottom: 24px; }
    h1 { font-size: 2rem; font-weight: 800; color: #facc15; margin-bottom: 12px; }
    p { color: #9ca3af; font-size: 1rem; max-width: 400px; line-height: 1.6; margin-bottom: 8px; }
    .btn {
      margin-top: 28px;
      background: #facc15;
      color: #000;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 12px 28px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover { background: #fde047; }
  </style>
</head>
<body>
  <div class="icon">📶</div>
  <h1>You're Offline</h1>
  <p>It looks like you've lost your internet connection.</p>
  <p>Please check your connection and try again.</p>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
</body>
</html>
