    <style>
      /* ── Critical CSS: inlined to ensure first meaningful paint before Vite bundle loads ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { overflow-x: hidden; max-width: 100vw; height: 100%; }
      body { font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; color: #fff; -webkit-font-smoothing: antialiased; }

      p { line-height: 1.6; }
      a { color: inherit; text-decoration: none; }
      button { cursor: pointer; font-family: inherit; border: none; }

      /* Utility classes used in hero before Tailwind loads */
      .min-h-screen { min-height: 100vh; }
      .text-center { text-align: center; }
      .flex { display: flex; }
      .items-center { align-items: center; }
      .justify-center { justify-content: center; }

      .px-6 { padding-left: 24px; padding-right: 24px; }
      .py-3 { padding-top: 12px; padding-bottom: 12px; }
      .font-bold { font-weight: 700; }
      .font-extrabold { font-weight: 800; }
      .text-white { color: #fff; }
      .text-sm { font-size: 0.875rem; }
      .text-xs { font-size: 0.75rem; }
      .rounded-md { border-radius: 6px; }
      .rounded-full { border-radius: 9999px; }

      .border { border-width: 1px; border-style: solid; }
      .sticky { position: sticky; }

      @media (min-width: 640px) { .sm\:block { display: block; } .sm\:hidden { display: none; } }

      @keyframes spin { to { transform: rotate(360deg); } }
